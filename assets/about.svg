<svg width="1200" height="460" viewBox="0 0 1200 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aboutBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="100%" stop-color="#0d1420"/>
    </linearGradient>
    <clipPath id="aboutFrame">
      <rect x="0" y="0" width="1200" height="460" rx="14"/>
    </clipPath>
  </defs>

  <g clip-path="url(#aboutFrame)">
    <rect width="1200" height="460" fill="url(#aboutBg)"/>

    <rect x="0" y="0" width="1200" height="46" fill="#10161f"/>
    <line x1="0" y1="46" x2="1200" y2="46" stroke="#1c2531" stroke-width="1"/>
    <circle cx="26" cy="23" r="6" fill="#ff5c73"/>
    <circle cx="48" cy="23" r="6" fill="#ffd166"/>
    <circle cx="70" cy="23" r="6" fill="#2ee6a6"/>
    <text x="96" y="28" 
      font-family="'JetBrains Mono','Fira Code',Consolas,monospace" 
      font-size="14" 
      fill="#7d8894">

    <g font-family="'JetBrains Mono','Fira Code',Consolas,monospace" font-size="15">

      <text x="40" y="82" fill="#e6edf3" opacity="0">
        <tspan fill="#2ee6a6">siva@progy</tspan><tspan fill="#4fd1ff">:~$</tspan> whoami
        <animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.1s" fill="freeze"/>
      </text>

      <text x="40" y="116" fill="#c7cfd8" opacity="0">I'm a <tspan fill="#e6edf3" font-weight="700">fresher</tspan> getting started in <tspan fill="#e6edf3" font-weight="700">data</tspan> — with an eye on banking, finance, and markets.
        <animate attributeName="opacity" values="0;1" dur="0.35s" begin="0.5s" fill="freeze"/>
      </text>
      <text x="40" y="140" fill="#c7cfd8" opacity="0">I like the idea of numbers that move: stock prices, portfolios, trading data.
        <animate attributeName="opacity" values="0;1" dur="0.35s" begin="0.8s" fill="freeze"/>
      </text>
      <text x="40" y="164" fill="#c7cfd8" opacity="0">Right now I'm still building my foundations in Python, SQL, and statistics,
        <animate attributeName="opacity" values="0;1" dur="0.35s" begin="1.1s" fill="freeze"/>
      </text>
      <text x="40" y="188" fill="#c7cfd8" opacity="0">and figuring out exactly where I fit — data analytics, data science, or
        <animate attributeName="opacity" values="0;1" dur="0.35s" begin="1.4s" fill="freeze"/>
      </text>
      <text x="40" y="212" fill="#c7cfd8" opacity="0">something closer to the trading desk. This profile is a work in progress,
        <animate attributeName="opacity" values="0;1" dur="0.35s" begin="1.7s" fill="freeze"/>
      </text>
      <text x="40" y="236" fill="#c7cfd8" opacity="0">the same way I am.
        <animate attributeName="opacity" values="0;1" dur="0.35s" begin="2.0s" fill="freeze"/>
      </text>

      <line x1="40" y1="256" x2="1160" y2="256" stroke="#1c2531" stroke-width="1" opacity="0">
        <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.3s" fill="freeze"/>
      </line>

      <g font-size="16">
        <text x="40" y="292" opacity="0">
          <tspan fill="#4fd1ff" font-weight="700">currently_learning:</tspan><tspan fill="#e6edf3" dx="10">Python for data analysis, SQL, and the basics of financial datasets</tspan>
          <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.5s" fill="freeze"/>
        </text>
        <text x="40" y="322" opacity="0">
          <tspan fill="#4fd1ff" font-weight="700">interested_in:</tspan><tspan fill="#e6edf3" dx="10">stock market data, portfolio analytics, and eventually algorithmic trading</tspan>
          <animate attributeName="opacity" values="0;1" dur="0.3s" begin="2.75s" fill="freeze"/>
        </text>
        <text x="40" y="352" opacity="0">
          <tspan fill="#4fd1ff" font-weight="700">goal:</tspan><tspan fill="#e6edf3" dx="10">land my first role in a data team at a bank, fintech, or trading firm</tspan>
          <animate attributeName="opacity" values="0;1" dur="0.3s" begin="3.0s" fill="freeze"/>
        </text>
        <text x="40" y="382" opacity="0">
          <tspan fill="#4fd1ff" font-weight="700">ask_me_about:</tspan><tspan fill="#e6edf3" dx="10">anything I'm learning — I'm probably a few chapters ahead of you</tspan>
          <animate attributeName="opacity" values="0;1" dur="0.3s" begin="3.25s" fill="freeze"/>
        </text>
        <text x="40" y="412" opacity="0">
          <tspan fill="#4fd1ff" font-weight="700">contact:</tspan><tspan fill="#2ee6a6" dx="10">sivav6064@gmail.com</tspan>
          <animate attributeName="opacity" values="0;1" dur="0.3s" begin="3.5s" fill="freeze"/>
        </text>
      </g>

      <rect x="40" y="428" width="9" height="16" fill="#2ee6a6" opacity="0">
        <animate attributeName="opacity" values="0;0;1" dur="0.1s" begin="3.8s" fill="freeze"/>
        <animate attributeName="opacity" values="1;0;1" dur="1s" begin="3.9s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>

  <rect x="0.5" y="0.5" width="1199" height="459" rx="14" fill="none" stroke="#1c2531" stroke-width="1"/>
</svg>
