<svg width="170" height="56" viewBox="0 0 170 56" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="eg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF512F">
        <animate attributeName="stop-color" values="#FF512F;#F09819;#FF512F" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#F09819">
        <animate attributeName="stop-color" values="#F09819;#FF512F;#F09819" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur result="b">
        <animate attributeName="stdDeviation" values="2;5;2" dur="2.4s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="2" y="2" width="166" height="52" rx="26" fill="url(#eg)" filter="url(#glow2)"/>
  <circle cx="30" cy="28" r="15" fill="rgba(255,255,255,0.18)">
    <animate attributeName="r" values="14;16;14" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <path d="M21 22 L30 29 L39 22" stroke="#ffffff" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="21" y="20" width="18" height="14" rx="2" fill="none" stroke="#ffffff" stroke-width="2"/>
  <text x="54" y="34" font-family="'Poppins','Segoe UI',sans-serif" font-size="17" font-weight="600" fill="#ffffff">Email</text>
</svg>
