<svg width="1200" height="620" viewBox="0 0 1200 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="orbitBg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#111726"/>
      <stop offset="100%" stop-color="#0a0e14"/>
    </radialGradient>
    <clipPath id="orbitFrame">
      <rect x="0" y="0" width="1200" height="620" rx="18"/>
    </clipPath>
  </defs>

  <g clip-path="url(#orbitFrame)">
    <rect width="1200" height="620" fill="url(#orbitBg)"/>

    <text x="40" y="40" font-family="'JetBrains Mono','Fira Code',Consolas,monospace" font-size="12" letter-spacing="3" fill="#7d8894">LIVE SKILL ORBIT</text>

    <!-- static guide rings -->
    <g fill="none" stroke-dasharray="2 5">
      <circle cx="600" cy="300" r="90" stroke="#8b7cf6" stroke-opacity="0.15"/>
      <circle cx="600" cy="300" r="150" stroke="#2ee6a6" stroke-opacity="0.15"/>
      <circle cx="600" cy="300" r="205" stroke="#ffd166" stroke-opacity="0.15"/>
      <circle cx="600" cy="300" r="260" stroke="#ff7ac6" stroke-opacity="0.15"/>
    </g>

    <!-- center hub -->
    <g transform="translate(600,300)" font-family="'JetBrains Mono','Fira Code',Consolas,monospace">
      <circle r="44" fill="none" stroke="#4fd1ff" stroke-opacity="0.35">
        <animate attributeName="r" values="40;56;40" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="stroke-opacity" values="0.4;0.05;0.4" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle r="34" fill="#10161f" stroke="#4fd1ff" stroke-width="1.5"/>
      <text text-anchor="middle" y="-2" font-size="14" font-weight="700" fill="#e6edf3">SIVA</text>
      <text text-anchor="middle" y="14" font-size="9" letter-spacing="2" fill="#7d8894">CORE</text>
    </g>

    <g font-family="'JetBrains Mono','Fira Code',Consolas,monospace">

      <!-- ===== Languages ring (r=90, 18s) ===== -->
      <g>
        <animateTransform attributeName="transform" type="rotate" values="0 600 300;360 600 300" dur="18s" repeatCount="indefinite"/>
        <line x1="600" y1="300" x2="600" y2="210" stroke="#8b7cf6" stroke-opacity="0.25"/>
        <line x1="600" y1="300" x2="677.9" y2="345" stroke="#8b7cf6" stroke-opacity="0.25"/>
        <line x1="600" y1="300" x2="522.1" y2="345" stroke="#8b7cf6" stroke-opacity="0.25"/>

        <g transform="translate(600,210)">
          <circle r="6" fill="#8b7cf6"/>
          <circle r="8" fill="#8b7cf6" opacity="0.3"><animate attributeName="r" values="8;14;8" dur="2.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;0.05;0.3" dur="2.2s" repeatCount="indefinite"/></circle>
          <g transform="translate(0,0)">
            <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="18s" repeatCount="indefinite" additive="sum"/>
            <text x="12" y="2" font-size="11" font-weight="700" fill="#8b7cf6">PYTH</text>
            <text x="12" y="14" font-size="8" fill="#7d8894">Python</text>
          </g>
        </g>

        <g transform="translate(677.9,345)">
          <circle r="6" fill="#8b7cf6"/>
          <circle r="8" fill="#8b7cf6" opacity="0.3"><animate attributeName="r" values="8;14;8" dur="2.2s" begin="0.3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;0.05;0.3" dur="2.2s" begin="0.3s" repeatCount="indefinite"/></circle>
          <g>
            <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="18s" repeatCount="indefinite" additive="sum"/>
            <text x="12" y="2" font-size="11" font-weight="700" fill="#8b7cf6">SQL</text>
            <text x="12" y="14" font-size="8" fill="#7d8894">SQL / Querying</text>
          </g>
        </g>

        <g transform="translate(522.1,345)">
          <circle r="6" fill="#8b7cf6"/>
          <circle r="8" fill="#8b7cf6" opacity="0.3"><animate attributeName="r" values="8;14;8" dur="2.2s" begin="0.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;0.05;0.3" dur="2.2s" begin="0.6s" repeatCount="indefinite"/></circle>
          <g>
            <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="18s" repeatCount="indefinite" additive="sum"/>
            <text x="-30" y="2" font-size="11" font-weight="700" fill="#8b7cf6">R</text>
            <text x="-30" y="14" font-size="8" fill="#7d8894">R</text>
          </g>
        </g>
      </g>

      <!-- ===== Data & Analysis ring (r=150, 26s) ===== -->
      <g>
        <animateTransform attributeName="transform" type="rotate" values="0 600 300;360 600 300" dur="26s" repeatCount="indefinite"/>
        <line x1="600" y1="300" x2="706.1" y2="193.9" stroke="#2ee6a6" stroke-opacity="0.25"/>
        <line x1="600" y1="300" x2="706.1" y2="406.1" stroke="#2ee6a6" stroke-opacity="0.25"/>
        <line x1="600" y1="300" x2="493.9" y2="406.1" stroke="#2ee6a6" stroke-opacity="0.25"/>
        <line x1="600" y1="300" x2="493.9" y2="193.9" stroke="#2ee6a6" stroke-opacity="0.25"/>

        <g transform="translate(706.1,193.9)">
          <circle r="6" fill="#2ee6a6"/>
          <circle r="8" fill="#2ee6a6" opacity="0.3"><animate attributeName="r" values="8;14;8" dur="2.4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;0.05;0.3" dur="2.4s" repeatCount="indefinite"/></circle>
          <g>
            <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="26s" repeatCount="indefinite" additive="sum"/>
            <text x="12" y="2" font-size="11" font-weight="700" fill="#2ee6a6">PNDS</text>
            <text x="12" y="14" font-size="8" fill="#7d8894">Pandas</text>
          </g>
        </g>

        <g transform="translate(706.1,406.1)">
          <circle r="6" fill="#2ee6a6"/>
          <circle r="8" fill="#2ee6a6" opacity="0.3"><animate attributeName="r" values="8;14;8" dur="2.4s" begin="0.4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;0.05;0.3" dur="2.4s" begin="0.4s" repeatCount="indefinite"/></circle>
          <g>
            <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="26s" repeatCount="indefinite" additive="sum"/>
            <text x="12" y="2" font-size="11" font-weight="700" fill="#2ee6a6">NPY</text>
            <text x="12" y="14" font-size="8" fill="#7d8894">NumPy</text>
          </g>
        </g>

        <g transform="translate(493.9,406.1)">
          <circle r="6" fill="#2ee6a6"/>
          <circle r="8" fill="#2ee6a6" opacity="0.3"><animate attributeName="r" values="8;14;8" dur="2.4s" begin="0.8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;0.05;0.3" dur="2.4s" begin="0.8s" repeatCount="indefinite"/></circle>
          <g>
            <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="26s" repeatCount="indefinite" additive="sum"/>
            <text x="-58" y="2" font-size="11" font-weight="700" fill="#2ee6a6">SKLN</text>
            <text x="-58" y="14" font-size="8" fill="#7d8894">scikit-learn</text>
          </g>
        </g>

        <g transform="translate(493.9,193.9)">
          <circle r="6" fill="#2ee6a6"/>
          <circle r="8" fill="#2ee6a6" opacity="0.3"><animate attributeName="r" values="8;14;8" dur="2.4s" begin="1.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;0.05;0.3" dur="2.4s" begin="1.2s" repeatCount="indefinite"/></circle>
          <g>
            <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="26s" repeatCount="indefinite" additive="sum"/>
            <text x="-52" y="2" font-size="11" font-weight="700" fill="#2ee6a6">STAT</text>
            <text x="-52" y="14" font-size="8" fill="#7d8894">Statistics</text>
          </g>
        </g>
      </g>

      <!-- ===== Visualization ring (r=205, 34s) ===== -->
      <g>
        <animateTransform attributeName="transform" type="rotate" values="0 600 300;360 600 300" dur="34s" repeatCount="indefinite"/>
        <line x1="600" y1="300" x2="731.8" y2="143.0" stroke="#ffd166" stroke-opacity="0.25"/>
        <line x1="600" y1="300" x2="670.1" y2="492.7" stroke="#ffd166" stroke-opacity="0.25"/>
        <line x1="600" y1="300" x2="398.1" y2="264.3" stroke="#ffd166" stroke-opacity="0.25"/>

        <g transform="translate(731.8,143.0)">
          <circle r="6" fill="#ffd166"/>
          <circle r="8" fill="#ffd166" opacity="0.3"><animate attributeName="r" values="8;14;8" dur="2.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;0.05;0.3" dur="2.6s" repeatCount="indefinite"/></circle>
          <g>
            <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="34s" repeatCount="indefinite" additive="sum"/>
            <text x="12" y="2" font-size="11" font-weight="700" fill="#ffd166">XLS</text>
            <text x="12" y="14" font-size="8" fill="#7d8894">Excel</text>
          </g>
        </g>

        <g transform="translate(670.1,492.7)">
          <circle r="6" fill="#ffd166"/>
          <circle r="8" fill="#ffd166" opacity="0.3"><animate attributeName="r" values="8;14;8" dur="2.6s" begin="0.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;0.05;0.3" dur="2.6s" begin="0.5s" repeatCount="indefinite"/></circle>
          <g>
            <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="34s" repeatCount="indefinite" additive="sum"/>
            <text x="12" y="2" font-size="11" font-weight="700" fill="#ffd166">PBI</text>
            <text x="12" y="14" font-size="8" fill="#7d8894">Power BI</text>
          </g>
        </g>

        <g transform="translate(398.1,264.3)">
          <circle r="6" fill="#ffd166"/>
          <circle r="8" fill="#ffd166" opacity="0.3"><animate attributeName="r" values="8;14;8" dur="2.6s" begin="1s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;0.05;0.3" dur="2.6s" begin="1s" repeatCount="indefinite"/></circle>
          <g>
            <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="34s" repeatCount="indefinite" additive="sum"/>
            <text x="-58" y="2" font-size="11" font-weight="700" fill="#ffd166">TBLU</text>
            <text x="-58" y="14" font-size="8" fill="#7d8894">Tableau</text>
          </g>
        </g>
      </g>

      <!-- ===== Finance ring (r=260, 42s) ===== -->
      <g>
        <animateTransform attributeName="transform" type="rotate" values="0 600 300;360 600 300" dur="42s" repeatCount="indefinite"/>
        <line x1="600" y1="300" x2="860" y2="300" stroke="#ff7ac6" stroke-opacity="0.25"/>
        <line x1="600" y1="300" x2="340" y2="300" stroke="#ff7ac6" stroke-opacity="0.25"/>

        <g transform="translate(860,300)">
          <circle r="6" fill="#ff7ac6"/>
          <circle r="8" fill="#ff7ac6" opacity="0.3"><animate attributeName="r" values="8;14;8" dur="2.8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;0.05;0.3" dur="2.8s" repeatCount="indefinite"/></circle>
          <g>
            <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="42s" repeatCount="indefinite" additive="sum"/>
            <text x="12" y="2" font-size="11" font-weight="700" fill="#ff7ac6">YFAPI</text>
            <text x="12" y="14" font-size="8" fill="#7d8894">Yahoo Finance API</text>
          </g>
        </g>

        <g transform="translate(340,300)">
          <circle r="6" fill="#ff7ac6"/>
          <circle r="8" fill="#ff7ac6" opacity="0.3"><animate attributeName="r" values="8;14;8" dur="2.8s" begin="0.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.3;0.05;0.3" dur="2.8s" begin="0.6s" repeatCount="indefinite"/></circle>
          <g>
            <animateTransform attributeName="transform" type="rotate" values="0;-360" dur="42s" repeatCount="indefinite" additive="sum"/>
            <text x="-76" y="2" font-size="11" font-weight="700" fill="#ff7ac6">XLFM</text>
            <text x="-76" y="14" font-size="8" fill="#7d8894">Financial Modeling</text>
          </g>
        </g>
      </g>
    </g>

    <!-- legend -->
    <g font-family="'JetBrains Mono','Fira Code',Consolas,monospace" font-size="12" fill="#7d8894">
      <circle cx="380" cy="585" r="5" fill="#8b7cf6"/><text x="392" y="589">Languages</text>
      <circle cx="500" cy="585" r="5" fill="#2ee6a6"/><text x="512" y="589">Data &amp; Analysis</text>
      <circle cx="660" cy="585" r="5" fill="#ffd166"/><text x="672" y="589">Visualization</text>
      <circle cx="800" cy="585" r="5" fill="#ff7ac6"/><text x="812" y="589">Finance &amp; Market Data</text>
    </g>
  </g>

  <rect x="0.5" y="0.5" width="1199" height="619" rx="18" fill="none" stroke="#1c2531" stroke-width="1"/>
</svg>
